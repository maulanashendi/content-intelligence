name: editor-intelligence

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    # Remove this service (and DATABASE_URL's default below) once Postgres
    # moves to a separate host/managed instance — every other service only
    # ever reads DATABASE_URL, never POSTGRES_*.

  api:
    build:
      context: backend
      dockerfile: Dockerfile
      target: api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ANALYST_LLM_PROVIDER: ${ANALYST_LLM_PROVIDER:-openai}
      ANALYST_LLM_API_KEY: ${ANALYST_LLM_API_KEY:?ANALYST_LLM_API_KEY is required}
      ANALYST_LLM_BASE_URL: ${ANALYST_LLM_BASE_URL:-}
      ANALYST_ANALYZE_MODEL: ${ANALYST_ANALYZE_MODEL:-gpt-4o}
      ANALYST_RECOMMEND_MODEL: ${ANALYST_RECOMMEND_MODEL:-gpt-4o}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/api/v1/health\").read()'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  pipeline-daemon:
    build:
      context: backend
      dockerfile: Dockerfile
      target: pipeline-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TIMEZONE: ${TIMEZONE:-Asia/Jakarta}
      CLUSTER_SCHEDULE_HOUR: ${CLUSTER_SCHEDULE_HOUR:-6}
      CLUSTER_SCHEDULE_MINUTE: ${CLUSTER_SCHEDULE_MINUTE:-0}
      CLUSTERING_WINDOW_DAYS: ${CLUSTERING_WINDOW_DAYS:-7}
      INGEST_TIMEOUT_SECONDS: ${INGEST_TIMEOUT_SECONDS:-30}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-api}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:?EMBEDDING_API_KEY is required}
      LABELING_PROVIDER: ${LABELING_PROVIDER:-api}
      LABELING_LLM_API_KEY: ${LABELING_LLM_API_KEY:?LABELING_LLM_API_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    stop_grace_period: 30s
    mem_limit: 1g
    command: ["serve"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'pipeline.cli serve' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  pipeline:
    build:
      context: backend
      dockerfile: Dockerfile
      target: pipeline-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TIMEZONE: ${TIMEZONE:-Asia/Jakarta}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-api}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      LABELING_PROVIDER: ${LABELING_PROVIDER:-api}
      LABELING_LLM_API_KEY: ${LABELING_LLM_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - manual
    restart: "no"
    logging: *default-logging

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      target: prod
    restart: always
    mem_limit: 128m
    depends_on:
      - api
    logging: *default-logging

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - api
      - frontend
    restart: always
    mem_limit: 128m
    logging: *default-logging

volumes:
  pgdata:
  caddy_data:
