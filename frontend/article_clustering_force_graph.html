<div style="padding: 1rem 0;">
  <h2 class="sr-only">Force-directed graph showing 3 article clusters with root nodes and interconnected articles</h2>

  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px;">
    <div style="display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px;">
      <div style="display: flex; align-items: center; gap: 6px;"><span style="width: 12px; height: 12px; border-radius: 50%; background: #D4537E; display: inline-block;"></span><span style="color: var(--color-text-secondary);">Politik</span></div>
      <div style="display: flex; align-items: center; gap: 6px;"><span style="width: 12px; height: 12px; border-radius: 50%; background: #1D9E75; display: inline-block;"></span><span style="color: var(--color-text-secondary);">Ekonomi</span></div>
      <div style="display: flex; align-items: center; gap: 6px;"><span style="width: 12px; height: 12px; border-radius: 50%; background: #7F77DD; display: inline-block;"></span><span style="color: var(--color-text-secondary);">Nasional</span></div>
    </div>
    <div style="display: flex; gap: 8px;">
      <button id="reset-btn" style="font-size: 12px; padding: 4px 10px;">Reset zoom</button>
    </div>
  </div>

  <div id="graph-wrapper" style="position: relative; width: 100%; height: 560px; background: var(--color-background-secondary); border-radius: var(--border-radius-lg); overflow: hidden;">
    <svg id="force-graph" width="100%" height="100%"></svg>
    <div id="tooltip" style="position: absolute; pointer-events: none; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 10px; font-size: 12px; max-width: 220px; opacity: 0; transition: opacity 0.15s; z-index: 10; color: var(--color-text-primary); line-height: 1.4;"></div>
    <div style="position: absolute; bottom: 8px; left: 12px; font-size: 11px; color: var(--color-text-tertiary);">Hover • Click • Drag • Scroll to zoom</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script>
    (function() {
      const svgEl = document.getElementById('force-graph');
      const wrapper = document.getElementById('graph-wrapper');
      const tooltip = document.getElementById('tooltip');
      const width = wrapper.clientWidth;
      const height = wrapper.clientHeight;

      const clusters = [
        { id: 'politik', label: 'Politik', color: '#D4537E', colorLight: '#F4C0D1', colorDark: '#993556' },
        { id: 'ekonomi', label: 'Ekonomi', color: '#1D9E75', colorLight: '#9FE1CB', colorDark: '#0F6E56' },
        { id: 'nasional', label: 'Nasional', color: '#7F77DD', colorLight: '#CECBF6', colorDark: '#534AB7' }
      ];

      const articleTitles = {
        politik: [
          'Reshuffle kabinet menjelang pemilu',
          'Koalisi partai politik 2026',
          'Survei elektabilitas capres terbaru',
          'Putusan MK soal ambang batas',
          'Debat publik calon kepala daerah',
          'RUU pemilu disahkan DPR',
          'Konflik internal partai oposisi',
          'Kampanye digital di media sosial',
          'Pemantauan independen pilkada',
          'Kebijakan luar negeri pemerintah'
        ],
        ekonomi: [
          'Inflasi naik 0.3 persen bulan ini',
          'BI Rate dipertahankan di level 6%',
          'Ekspor komoditas turun signifikan',
          'IHSG ditutup melemah hari ini',
          'Rupiah menguat terhadap dolar',
          'APBN 2026 disetujui parlemen',
          'Investasi asing di sektor digital',
          'UMKM dapat insentif pajak',
          'Harga pangan naik jelang lebaran',
          'Kinerja BUMN kuartal pertama'
        ],
        nasional: [
          'Banjir bandang di kalimantan timur',
          'Program makan bergizi gratis dimulai',
          'Kecelakaan tol trans jawa',
          'Vaksinasi DBD nasional digalakkan',
          'Konflik agraria di sumatera',
          'Penegakan hukum kasus korupsi',
          'Bencana erupsi gunung berapi',
          'Pendidikan vokasi diperluas',
          'Mudik lebaran arus puncak',
          'Reformasi birokrasi kementerian'
        ]
      };

      const nodes = [];
      const links = [];

      const centers = [
        { x: width * 0.25, y: height * 0.35 },
        { x: width * 0.75, y: height * 0.35 },
        { x: width * 0.5, y: height * 0.75 }
      ];

      clusters.forEach((cluster, idx) => {
        const rootId = `${cluster.id}-root`;
        nodes.push({
          id: rootId,
          label: cluster.label,
          cluster: cluster.id,
          color: cluster.color,
          colorLight: cluster.colorLight,
          colorDark: cluster.colorDark,
          isRoot: true,
          size: 32,
          x: centers[idx].x,
          y: centers[idx].y,
          fullTitle: `Root cluster: ${cluster.label}`
        });

        const titles = articleTitles[cluster.id];
        titles.forEach((title, i) => {
          const articleId = `${cluster.id}-${i}`;
          const size = 6 + Math.random() * 6;
          nodes.push({
            id: articleId,
            label: title,
            cluster: cluster.id,
            color: cluster.color,
            colorLight: cluster.colorLight,
            colorDark: cluster.colorDark,
            isRoot: false,
            size: size,
            x: centers[idx].x + (Math.random() - 0.5) * 100,
            y: centers[idx].y + (Math.random() - 0.5) * 100,
            fullTitle: title
          });

          links.push({
            source: rootId,
            target: articleId,
            strength: 0.6,
            isRootLink: true
          });
        });

        for (let i = 0; i < titles.length; i++) {
          const numConnections = 1 + Math.floor(Math.random() * 3);
          const connected = new Set();
          for (let j = 0; j < numConnections; j++) {
            let target = Math.floor(Math.random() * titles.length);
            if (target !== i && !connected.has(target)) {
              connected.add(target);
              links.push({
                source: `${cluster.id}-${i}`,
                target: `${cluster.id}-${target}`,
                strength: 0.3,
                isRootLink: false
              });
            }
          }
        }
      });

      const crossLinks = [
        { source: 'politik-5', target: 'ekonomi-5' },
        { source: 'ekonomi-7', target: 'nasional-7' },
        { source: 'politik-9', target: 'nasional-5' },
        { source: 'ekonomi-2', target: 'nasional-4' }
      ];
      crossLinks.forEach(l => links.push({ ...l, strength: 0.05, isCross: true }));

      const svg = d3.select(svgEl);
      const g = svg.append('g');

      const zoom = d3.zoom()
        .scaleExtent([0.3, 3])
        .on('zoom', (event) => {
          g.attr('transform', event.transform);
        });
      svg.call(zoom);

      document.getElementById('reset-btn').addEventListener('click', () => {
        svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
      });

      const simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(d => {
          if (d.isCross) return 180;
          if (d.isRootLink) return 70;
          return 45;
        }).strength(d => d.strength))
        .force('charge', d3.forceManyBody().strength(d => d.isRoot ? -800 : -120))
        .force('collide', d3.forceCollide().radius(d => d.size + 4))
        .force('cluster', alpha => {
          nodes.forEach(node => {
            const idx = clusters.findIndex(c => c.id === node.cluster);
            const center = centers[idx];
            const k = node.isRoot ? 0.15 : 0.04;
            node.vx += (center.x - node.x) * k * alpha;
            node.vy += (center.y - node.y) * k * alpha;
          });
        })
        .force('boundary', () => {
          nodes.forEach(node => {
            const margin = node.size + 5;
            if (node.x < margin) node.x = margin;
            if (node.x > width - margin) node.x = width - margin;
            if (node.y < margin) node.y = margin;
            if (node.y > height - margin) node.y = height - margin;
          });
        });

      const link = g.append('g')
        .selectAll('line')
        .data(links)
        .join('line')
        .attr('stroke', d => d.isCross ? '#B4B2A9' : (d.isRootLink ? nodes.find(n => n.id === (typeof d.source === 'object' ? d.source.id : d.source)).color : '#D3D1C7'))
        .attr('stroke-opacity', d => d.isCross ? 0.3 : (d.isRootLink ? 0.5 : 0.4))
        .attr('stroke-width', d => d.isRootLink ? 1.5 : 0.8)
        .attr('stroke-dasharray', d => d.isCross ? '3,3' : null);

      const node = g.append('g')
        .selectAll('g')
        .data(nodes)
        .join('g')
        .style('cursor', 'pointer');

      node.append('circle')
        .attr('r', d => d.size)
        .attr('fill', d => d.isRoot ? d.color : d.colorLight)
        .attr('stroke', d => d.color)
        .attr('stroke-width', d => d.isRoot ? 2 : 1);

      node.filter(d => d.isRoot)
        .append('text')
        .text(d => d.label)
        .attr('text-anchor', 'middle')
        .attr('dy', '0.35em')
        .attr('fill', 'white')
        .attr('font-size', '12px')
        .attr('font-weight', '500')
        .style('pointer-events', 'none');

      let selectedNode = null;

      node.on('mouseenter', function(event, d) {
        const rect = wrapper.getBoundingClientRect();
        tooltip.style.opacity = '1';
        tooltip.innerHTML = `<div style="font-weight: 500; margin-bottom: 2px;">${d.fullTitle}</div><div style="color: var(--color-text-secondary); font-size: 11px;">Cluster: ${clusters.find(c => c.id === d.cluster).label}</div>`;
        const tx = event.clientX - rect.left + 12;
        const ty = event.clientY - rect.top + 12;
        tooltip.style.left = Math.min(tx, rect.width - 230) + 'px';
        tooltip.style.top = Math.min(ty, rect.height - 60) + 'px';
      })
      .on('mousemove', function(event) {
        const rect = wrapper.getBoundingClientRect();
        const tx = event.clientX - rect.left + 12;
        const ty = event.clientY - rect.top + 12;
        tooltip.style.left = Math.min(tx, rect.width - 230) + 'px';
        tooltip.style.top = Math.min(ty, rect.height - 60) + 'px';
      })
      .on('mouseleave', function() {
        tooltip.style.opacity = '0';
      })
      .on('click', function(event, d) {
        event.stopPropagation();
        if (selectedNode === d.id) {
          selectedNode = null;
          resetHighlight();
        } else {
          selectedNode = d.id;
          highlightConnections(d.id);
        }
      });

      svg.on('click', () => {
        selectedNode = null;
        resetHighlight();
      });

      function highlightConnections(nodeId) {
        const connectedIds = new Set([nodeId]);
        links.forEach(l => {
          const s = typeof l.source === 'object' ? l.source.id : l.source;
          const t = typeof l.target === 'object' ? l.target.id : l.target;
          if (s === nodeId) connectedIds.add(t);
          if (t === nodeId) connectedIds.add(s);
        });

        node.selectAll('circle')
          .attr('opacity', d => connectedIds.has(d.id) ? 1 : 0.15);
        node.selectAll('text')
          .attr('opacity', d => connectedIds.has(d.id) ? 1 : 0.15);
        link
          .attr('stroke-opacity', l => {
            const s = typeof l.source === 'object' ? l.source.id : l.source;
            const t = typeof l.target === 'object' ? l.target.id : l.target;
            return (s === nodeId || t === nodeId) ? 0.9 : 0.05;
          })
          .attr('stroke-width', l => {
            const s = typeof l.source === 'object' ? l.source.id : l.source;
            const t = typeof l.target === 'object' ? l.target.id : l.target;
            return (s === nodeId || t === nodeId) ? 2 : 0.8;
          });
      }

      function resetHighlight() {
        node.selectAll('circle').attr('opacity', 1);
        node.selectAll('text').attr('opacity', 1);
        link
          .attr('stroke-opacity', d => d.isCross ? 0.3 : (d.isRootLink ? 0.5 : 0.4))
          .attr('stroke-width', d => d.isRootLink ? 1.5 : 0.8);
      }

      const drag = d3.drag()
        .on('start', (event, d) => {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          d.fx = d.x;
          d.fy = d.y;
        })
        .on('drag', (event, d) => {
          d.fx = event.x;
          d.fy = event.y;
        })
        .on('end', (event, d) => {
          if (!event.active) simulation.alphaTarget(0);
          d.fx = null;
          d.fy = null;
        });

      node.call(drag);

      simulation.on('tick', () => {
        link
          .attr('x1', d => d.source.x)
          .attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x)
          .attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
      });
    })();
  </script>
</div>
