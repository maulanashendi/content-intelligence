[project]
name = "scoring"
version = "0.1.0"
description = "Compute trend velocity, novelty, coverage, and recommendation per cluster"
requires-python = ">=3.11"
dependencies = [
  "core",
  "scikit-learn>=1.5",
  "numpy>=1.26",
  "click>=8.1",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/scoring"]
