[project]
name = "api"
version = "0.1.0"
description = "FastAPI HTTP layer — read-only endpoints serving the dashboard"
requires-python = ">=3.11"
dependencies = [
  "core",
  "analyst",
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "python-json-logger>=2.0",
  "sqlalchemy>=2",
  "pydantic>=2",
]

[tool.uv.sources]
core = { workspace = true }
analyst = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]
