[project]
name = "pipeline"
version = "0.1.0"
description = "Daily batch orchestrator — invokes ingest, embedding, clustering, labeling, scoring"
requires-python = ">=3.11"
dependencies = [
  "core",
  "ingest",
  "embedding",
  "clustering",
  "labeling",
  "scoring",
  "click>=8.1",
]

[project.optional-dependencies]
local = [
  "embedding[local]",
  "labeling[local]",
]

[tool.uv.sources]
core = { workspace = true }
ingest = { workspace = true }
embedding = { workspace = true }
clustering = { workspace = true }
labeling = { workspace = true }
scoring = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pipeline"]
