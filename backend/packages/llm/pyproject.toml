[project]
name = "llm"
version = "0.1.0"
description = "Shared LLM client kernel: OpenAI-compatible provider presets + structured output"
requires-python = ">=3.11"
dependencies = [
  "openai>=1.40",
  "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/llm"]
