[project]
name = "core"
version = "0.1.0"
description = "Shared kernel: SQLAlchemy models, async DB session, settings"
requires-python = ">=3.11"
dependencies = [
  "sqlalchemy[asyncio]>=2.0",
  "asyncpg>=0.30",
  "pgvector>=0.3",
  "pydantic>=2.9",
  "pydantic-settings>=2.5",
  "python-json-logger>=2.0",
  "alembic>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/core"]
