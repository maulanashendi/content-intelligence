[project]
name = "labeling"
version = "0.1.0"
description = "Generate cluster labels using a small local LLM (Gemma 2B class)"
requires-python = ">=3.11"
dependencies = [
  "core",
  "transformers>=4.45",
  "torch>=2.4",
  "bitsandbytes>=0.44",
  "accelerate>=1.0",
  "click>=8.1",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/labeling"]
