[project]
name = "ingest"
version = "0.1.0"
description = "Fetch articles from competitor RSS, Tempo sitemap, and Google Trends RSS"
requires-python = ">=3.11"
dependencies = [
  "core",
  "feedparser>=6.0",
  "httpx>=0.27",
  "lxml>=5.3",
  "click>=8.1",
  "google-api-python-client>=2.0",
  "google-auth>=2.0",
  "trafilatura>=1.9",
  "playwright>=1.44",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ingest"]
