[project]
name = "ingest"
version = "0.1.0"
description = "Fetch articles from competitor RSS, Tempo sitemap, and Google Trends RSS"
requires-python = ">=3.11"
dependencies = [
  "core",
  "feedparser>=6.0",
  "httpx>=0.27",
  "lxml>=5.3",
  "click>=8.1",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ingest"]
