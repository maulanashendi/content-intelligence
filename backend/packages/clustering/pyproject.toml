[project]
name = "clustering"
version = "0.1.0"
description = "UMAP dimensionality reduction + HDBSCAN clustering of article embeddings"
requires-python = ">=3.11"
dependencies = [
  "core",
  "umap-learn>=0.5",
  "hdbscan>=0.8.38",
  "scikit-learn>=1.5",
  "numpy>=1.26",
  "click>=8.1",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/clustering"]
