[project]
name = "embedding"
version = "0.1.0"
description = "Generate dense vectors for articles using google/embeddinggemma-300m (768 dim)"
requires-python = ">=3.11"
dependencies = [
  "core",
  "sentence-transformers>=3.2",
  "torch>=2.4",
  "click>=8.1",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/embedding"]
