name: editor-intelligence

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ANALYST_LLM_PROVIDER: ${ANALYST_LLM_PROVIDER:-openai}
      ANALYST_LLM_API_KEY: ${ANALYST_LLM_API_KEY:?ANALYST_LLM_API_KEY is required}
      ANALYST_LLM_BASE_URL: ${ANALYST_LLM_BASE_URL:-}
      ANALYST_ANALYZE_MODEL: ${ANALYST_ANALYZE_MODEL:-gpt-4o}
      ANALYST_RECOMMEND_MODEL: ${ANALYST_RECOMMEND_MODEL:-gpt-4o}
    ports:
      - "127.0.0.1:8000:8000"
    mem_limit: 512m
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/api/v1/health\").read()'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  pipeline-daemon:
    build:
      context: .
      dockerfile: Dockerfile
      target: pipeline-api
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TIMEZONE: ${TIMEZONE:-Asia/Jakarta}
      CLUSTER_SCHEDULE_HOUR: ${CLUSTER_SCHEDULE_HOUR:-6}
      CLUSTER_SCHEDULE_MINUTE: ${CLUSTER_SCHEDULE_MINUTE:-0}
      CLUSTERING_WINDOW_DAYS: ${CLUSTERING_WINDOW_DAYS:-7}
      INGEST_TIMEOUT_SECONDS: ${INGEST_TIMEOUT_SECONDS:-30}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-api}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:?EMBEDDING_API_KEY is required}
      LABELING_PROVIDER: ${LABELING_PROVIDER:-api}
      LABELING_LLM_API_KEY: ${LABELING_LLM_API_KEY:?LABELING_LLM_API_KEY is required}
    mem_limit: 1g
    restart: always
    stop_grace_period: 30s
    command: ["serve"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'pipeline.cli serve' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      target: pipeline-api
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TIMEZONE: ${TIMEZONE:-Asia/Jakarta}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-api}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      LABELING_PROVIDER: ${LABELING_PROVIDER:-api}
      LABELING_LLM_API_KEY: ${LABELING_LLM_API_KEY:-}
    profiles:
      - manual
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
