name: content-intelligence

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: editor_intelligence
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d editor_intelligence"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-dev
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/editor_intelligence
      LOG_LEVEL: INFO
      ANALYST_LLM_PROVIDER: ${ANALYST_LLM_PROVIDER:-openai}
      ANALYST_LLM_API_KEY: ${ANALYST_LLM_API_KEY:-}
      ANALYST_LLM_BASE_URL: ${ANALYST_LLM_BASE_URL:-}
      ANALYST_ANALYZE_MODEL: ${ANALYST_ANALYZE_MODEL:-gpt-4o}
      ANALYST_RECOMMEND_MODEL: ${ANALYST_RECOMMEND_MODEL:-gpt-4o}
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages:/app/packages
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: prod
    environment:
      VITE_BACKEND_URL: http://api:8000
      VITE_MOCK: "false"
    ports:
      - "5174:5173"
    working_dir: /app/packages/app
    command: ["./node_modules/.bin/vite", "--host"]
    depends_on:
      - api

  pipeline-daemon:
    build:
      context: .
      dockerfile: Dockerfile
      target: pipeline-api-dev
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/editor_intelligence
      LOG_LEVEL: INFO
      HF_HOME: /models
      HF_TOKEN: ${HF_TOKEN}
      TIMEZONE: Asia/Jakarta
      CLUSTER_SCHEDULE_HOUR: "6"
      CLUSTER_SCHEDULE_MINUTE: "0"
      CLUSTERING_WINDOW_DAYS: "${CLUSTERING_WINDOW_DAYS:-7}"
      INGEST_TIMEOUT_SECONDS: "30"
      GSC_SITE_URL: ${GSC_SITE_URL:-sc-domain:tempo.co}
      GSC_CREDENTIALS_PATH: /app/gsc-credentials.json
      GSC_FETCH_DAYS: ${GSC_FETCH_DAYS:-7}
      PIPELINE_LOCK_LEASE_TTL_SECONDS: ${PIPELINE_LOCK_LEASE_TTL_SECONDS:-300}
      PIPELINE_LOCK_HEARTBEAT_SECONDS: ${PIPELINE_LOCK_HEARTBEAT_SECONDS:-30}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-api}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_API_BASE_URL: ${EMBEDDING_API_BASE_URL:-https://openrouter.ai/api/v1}
      EMBEDDING_API_MODEL: ${EMBEDDING_API_MODEL:-openai/text-embedding-3-large}
      LABELING_PROVIDER: ${LABELING_PROVIDER:-api}
      LABELING_LLM_API_KEY: ${LABELING_LLM_API_KEY:-}
      LABELING_LLM_BASE_URL: ${LABELING_LLM_BASE_URL:-}
      LABELING_MODEL: ${LABELING_MODEL:-openai/gpt-4o-mini}
    volumes:
      - hfcache:/models
      - ./packages:/app/packages
      - ./teco-analytics-2cea1d43461c.json:/app/gsc-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 7g
    memswap_limit: 7g
    command: ["serve"]

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      target: pipeline-api-dev
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/editor_intelligence
      LOG_LEVEL: INFO
      HF_HOME: /models
      HF_TOKEN: ${HF_TOKEN}
      TIMEZONE: Asia/Jakarta
      GSC_SITE_URL: ${GSC_SITE_URL:-sc-domain:tempo.co}
      GSC_CREDENTIALS_PATH: /app/gsc-credentials.json
      GSC_FETCH_DAYS: ${GSC_FETCH_DAYS:-7}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-api}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_API_BASE_URL: ${EMBEDDING_API_BASE_URL:-https://openrouter.ai/api/v1}
      EMBEDDING_API_MODEL: ${EMBEDDING_API_MODEL:-openai/text-embedding-3-large}
      LABELING_PROVIDER: ${LABELING_PROVIDER:-api}
      LABELING_LLM_API_KEY: ${LABELING_LLM_API_KEY:-}
      LABELING_LLM_BASE_URL: ${LABELING_LLM_BASE_URL:-}
      LABELING_MODEL: ${LABELING_MODEL:-openai/gpt-4o-mini}
    volumes:
      - hfcache:/models
      - ./packages:/app/packages
      - ./teco-analytics-2cea1d43461c.json:/app/gsc-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - manual

volumes:
  pgdata:
  hfcache:
