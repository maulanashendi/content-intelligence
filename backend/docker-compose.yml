name: editor-intelligence

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: editor_intelligence
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d editor_intelligence"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-dev
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/editor_intelligence
      LOG_LEVEL: INFO
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages:/app/packages
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini

  pipeline-daemon:
    build:
      context: .
      dockerfile: Dockerfile
      target: pipeline-dev
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/editor_intelligence
      LOG_LEVEL: INFO
      HF_HOME: /models
      HF_TOKEN: ${HF_TOKEN}
      TIMEZONE: Asia/Jakarta
      CLUSTER_SCHEDULE_HOUR: "6"
      CLUSTER_SCHEDULE_MINUTE: "0"
      CLUSTERING_WINDOW_DAYS: "7"
      INGEST_TIMEOUT_SECONDS: "30"
      GSC_SITE_URL: ${GSC_SITE_URL:-sc-domain:tempo.co}
      GSC_CREDENTIALS_PATH: /app/gsc-credentials.json
      GSC_FETCH_DAYS: ${GSC_FETCH_DAYS:-7}
    volumes:
      - hfcache:/models
      - ./packages:/app/packages
      - ./teco-analytics-2cea1d43461c.json:/app/gsc-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: ["serve"]

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      target: pipeline-dev
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/editor_intelligence
      LOG_LEVEL: INFO
      HF_HOME: /models
      HF_TOKEN: ${HF_TOKEN}
      TIMEZONE: Asia/Jakarta
      GSC_SITE_URL: ${GSC_SITE_URL:-sc-domain:tempo.co}
      GSC_CREDENTIALS_PATH: /app/gsc-credentials.json
      GSC_FETCH_DAYS: ${GSC_FETCH_DAYS:-7}
    volumes:
      - hfcache:/models
      - ./packages:/app/packages
      - ./teco-analytics-2cea1d43461c.json:/app/gsc-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - manual

volumes:
  pgdata:
  hfcache:
