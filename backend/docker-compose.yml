services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: editor_intelligence
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d editor_intelligence"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/editor_intelligence
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      target: pipeline
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/editor_intelligence
      LOG_LEVEL: INFO
      HF_HOME: /models
      TIMEZONE: Asia/Jakarta
    volumes:
      - hfcache:/models
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - manual

volumes:
  pgdata:
  hfcache:
